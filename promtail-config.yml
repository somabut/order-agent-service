server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: spring
    static_configs:
      - targets:
          - order-agent-service
        labels:
          job: spring
          __path__: /logs/log/*.log
          app: OrderAgentService
          host: order-agent-service