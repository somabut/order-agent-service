name: Deploy with Compose on Server

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_dispatch:

env:
  IMAGE_NAME: moodtrbl/dev-order-agent-service  # 빌드할 이미지명(수정 가능) 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - uses: actions/checkout@v4

      # 2. JDK 21 설치 (Spring 프로젝트일 경우)
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: make application.yml
        run: |
          mkdir -p ./src/main/resources
          cd ./src/main/resources 
          touch ./application.yml
          echo "${{ secrets.APPLICATION }}" > ./application.yml

      # 3. Gradle 빌드 (Spring 프로젝트인 경우)
      - run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # 4. 도커 빌드셋업
      - uses: docker/setup-buildx-action@v3

      # 5. 도커허브 로그인
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. 도커 이미지 빌드 & 푸시 (항상 태그는 latest)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
          no-cache: true

      # 7. AWS 서버에 SSH 접속해서 compose 실행
      - name: Deploy via Compose (Server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_AWS_HOST }}
          username: ${{ secrets.DEV_AWS_USER }}
          key: ${{ secrets.DEV_AWS_KEY }}
          script: |
            # compose 파일 위치로 이동 (예시: /home/ubuntu/deploy)
            cd /home/${{ secrets.DEV_AWS_USER }}/order-agent-service

            # 서비스 중단 후 재시작
            docker-compose down
            docker rmi moodtrbl/dev-order-agent-service:latest
            docker-compose pull
            docker-compose up -d

            # 불필요한 도커 이미지 정리(옵션)
            docker image prune -f
